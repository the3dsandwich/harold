# Harold — personal assistant notification framework
#
# Usage:
#   cp .env.example .env   # fill in your tokens and location
#   docker compose up -d

services:
  harold:
    image: ${IMAGE:-harold}
    container_name: harold
    build:
      context: .
      dockerfile: docker/Containerfile
    env_file: .env
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${DASHBOARD_PORT:-8080}:${DASHBOARD_PORT:-8080}"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: harold-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --schedule "${WATCHTOWER_SCHEDULE:-@hourly}"
    environment:
      - TZ=${TZ:-Asia/Taipei}
    restart: unless-stopped
