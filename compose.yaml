# Harold — personal assistant notification framework
#
# Usage:
#   cp .env.example .env   # fill in your tokens and location
#   docker compose up -d

services:
  harold:
    image: ${IMAGE:-harold}
    container_name: harold
    build:
      context: .
      dockerfile: docker/Containerfile
    env_file: .env
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${DASHBOARD_PORT:-8080}:${DASHBOARD_PORT:-8080}"
    labels:
      - com.centurylinklabs.watchtower.scope=harold
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: harold-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --scope harold --schedule "${WATCHTOWER_SCHEDULE:-@hourly}"
    environment:
      - TZ=${TZ:-Asia/Taipei}
      # Watchtower 1.7.1 negotiates Docker API v1.25 by default, which Docker
      # Engine 26+ rejects (minimum is v1.44). Pinning here bypasses negotiation.
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped
